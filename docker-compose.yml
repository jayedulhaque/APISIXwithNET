services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    restart: always
    volumes:
      - etcd_data:/bitnami/etcd
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    networks:
      - apisix

  apisix:
    image: apache/apisix:3.15.0-debian
    restart: always
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      - etcd
    ports:
      - "9180:9180"
      - "9080:9080"
      - "9091:9091"
      - "9443:9443"
      - "9092:9092"
    networks:
      - apisix

  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    restart: always
    volumes:
      - ./dashboard_conf/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      - etcd
    ports:
      - "9000:9000"
    networks:
      - apisix

  app1:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: app1
    networks:
      - apisix

  app2:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: app2
    networks:
      - apisix

  casdoor:
    image: casbin/casdoor-all-in-one:2.388.1
    restart: always
    volumes:
      - casdoor_data:/data
      - ./casdoor_conf/app.conf:/conf/app.conf:ro
    ports:
      - "8000:8000"
    networks:
      - apisix

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tenant_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - apisix

  tenantmanagement:
    build:
      context: ./TenantManagement
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TenantManagementDb: Host=postgres;Port=5432;Database=tenant_management;Username=postgres;Password=postgres
      Casdoor__Authority: http://casdoor.localhost:9080
      Casdoor__Audience: tenant-management
      Casdoor__RequireHttpsMetadata: "false"
    depends_on:
      - postgres
    networks:
      - apisix

networks:
  apisix:
    driver: bridge

volumes:
  etcd_data:
  casdoor_data:
  postgres_data:
